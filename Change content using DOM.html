<!DOCTYPE html>
<html>
<head>
    <title>Change Text Using DOM</title>
</head>
<body>

    <h2 id="message">Hello World!</h2>

    <button onclick="changeText()">Change Text</button>

    <script>
        function changeText() {
            document.getElementById("message").textContent = "Welcome to JavaScript DOM!";
        }
    </script>

</body>
</html>
