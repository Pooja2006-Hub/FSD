<!DOCTYPE html>
<html>
<head>
    <title>Student Details Table</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: darkblue;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 70%;
            background-color: white;
            box-shadow: 0px 0px 10px gray;
        }

        th {
            background-color: #4CAF50;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #d1e7ff;
        }
    </style>
</head>
<body>

    <h1>Student Details Table</h1>

    <table border="1">
        <tr>
            <th>Name</th>
            <th>Course</th>
            <th>Year</th>
            <th>College</th>
        </tr>

        <tr>
            <td>Pooja</td>
            <td>B.Sc Computer Science with AI</td>
            <td>III Year</td>
            <td>ABC Arts & Science College</td>
        </tr>

        <tr>
            <td>Anu</td>
            <td>BCA</td>
            <td>II Year</td>
            <td>XYZ College</td>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>B.Sc IT</td>
            <td>I Year</td>
            <td>PQR College</td>
        </tr>

    </table>

</body>
</html>
