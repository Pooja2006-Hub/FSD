<!DOCTYPE html>
<html>
<head>
    <title>Inline CSS Stylish Example</title>
</head>
<body style="background: linear-gradient(to right, #74ebd5, #ACB6E5); text-align:center; padding:50px;">

    <h1 style="
        color: white;
        font-size: 45px;
        font-family: Georgia, serif;
        text-shadow: 3px 3px 5px gray;
        background-color: #4B0082;
        padding: 15px;
        border-radius: 10px;">
        Welcome to My Web Page
    </h1>

    <p style="
        color: #333333;
        font-size: 22px;
        font-family: Verdana, sans-serif;
        background-color: white;
        padding: 20px;
        margin: 30px auto;
        width: 70%;
        border-radius: 15px;
        box-shadow: 0px 0px 15px gray;">
        
        Hello! My name is Pooja. I am pursuing a B.Sc. in Computer Science with Artificial Intelligence.
        I am passionate about technology and enjoy learning new programming skills. This paragraph is styled using inline CSS with custom colors, fonts, spacing, and shadow effects.
    
    </p>

</body>
</html>
